[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fms-odata-spec"
version = "0.1.0"
description = "Python types and spec definitions for the FileMaker Server OData API, mirroring @fms-odata/spec-ts."
readme = "README.md"
license = "MIT"
authors = [
    { name = "Francesc Sans", email = "tecnic@ntwk.es" },
]
requires-python = ">=3.9"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
keywords = ["filemaker", "claris", "odata", "fms", "spec", "types", "api"]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "build>=1.0",
    "twine>=4.0",
]

[project.urls]
Homepage = "https://github.com/fsans/fms-odata-spec"
Repository = "https://github.com/fsans/fms-odata-spec"
Issues = "https://github.com/fsans/fms-odata-spec/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/fms_odata_spec"]

[tool.hatch.build.targets.sdist]
include = [
    "src/fms_odata_spec",
    "tests",
    "README.md",
    "LICENSE",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
