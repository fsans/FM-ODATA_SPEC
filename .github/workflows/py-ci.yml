name: py-ci

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/fms-odata-spec-py/**"
      - ".github/workflows/py-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/fms-odata-spec-py/**"
      - ".github/workflows/py-ci.yml"

defaults:
  run:
    working-directory: packages/fms-odata-spec-py

jobs:
  test:
    name: Test & build (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/fms-odata-spec-py/pyproject.toml

      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -ra

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-py-${{ matrix.python-version }}
          path: packages/fms-odata-spec-py/dist/
          if-no-files-found: error
